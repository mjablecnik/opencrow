version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-telegram-chatbot
    restart: unless-stopped
    environment:
      - TZ=Europe/Prague
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-google/gemini-2.5-flash-lite}
      - SHELL_TIMEOUT=${SHELL_TIMEOUT:-30s}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MEMORY_TOKEN_THRESHOLD=${MEMORY_TOKEN_THRESHOLD:-50000}
      - TOPIC_SIZE_THRESHOLD=${TOPIC_SIZE_THRESHOLD:-102400}
      - NOTES_CLEANUP_ENABLED=${NOTES_CLEANUP_ENABLED:-true}
      - NOTES_MAX_AGE_DAYS=${NOTES_MAX_AGE_DAYS:-30}
      - NOTES_COMPLETED_RETENTION_DAYS=${NOTES_COMPLETED_RETENTION_DAYS:-7}
      - NOTES_SCRATCHPAD_MAX_AGE_DAYS=${NOTES_SCRATCHPAD_MAX_AGE_DAYS:-7}
      - DAILY_MAINTENANCE_TIME=${DAILY_MAINTENANCE_TIME:-0 4 * * *}
    volumes:
      - ./agent:/app/agent:ro
      - ./logs:/app/logs
      - ./memory:/app/memory
      - ./config:/app/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
